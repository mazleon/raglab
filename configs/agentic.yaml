collection: raglab_demo
architecture: agentic_rag

embedding:
  name: hashing
  dim: 384

vectorstore:
  name: qdrant
  location: ":memory:"
  distance: cosine

retrieval:
  type: hybrid
  dense_k: 20
  bm25_k: 20
  fusion: rrf
  rrf_k: 60
  k: 6

reranker:
  name: noop
  top_n: 5

llm:
  provider: echo        # for a real agentic loop use openrouter (e.g. google/gemma-4-31b:free)
  temperature: 0.0
  max_tokens: 768

# Agentic self-correction controls.
agent:
  max_retrieval_retries: 2
  grade_threshold: 0.6
  enable_critic: true

observability:
  langfuse: false
  langsmith: false
