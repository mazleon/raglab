name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-type-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.13
      - name: Install (dev)
        run: uv pip install --system -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src
      - name: Unit tests
        run: pytest tests/unit -q

  integration:
    # Integration tests run offline (in-memory Qdrant); a real Qdrant service is
    # provided for parity with production wiring.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.13
      - name: Install (dev)
        run: uv pip install --system -e ".[dev]"
      - name: Integration tests
        run: pytest tests/integration -q
